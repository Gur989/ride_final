name: Data Pipeline

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Show Python Version
        run: python --version

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Script
        run: python update_data.py
