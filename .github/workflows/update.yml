name: Auto Update Data

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: python --version   # ✅ debug step

      - run: pip install -r requirements.txt

      - run: python update_data.py
